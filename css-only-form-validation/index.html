<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
 <link rel="stylesheet" href="./style.css">
<div class="container">
  <div class="card">

    <div class="card-header">
      <div class="card-title-block">
        <span class="card-eyebrow">Contact</span>
        <h2 class="form-title">Get in <span>Touch</span></h2>
      </div>
      <p class="card-header-right">All fields are required.<br />We respond within 24 hours.</p>
    </div>

    <form novalidate>

      <div class="row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" placeholder="John" minlength="3" required autocomplete="off" />
          <div class="invalid-feedback">At least 3 characters</div>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" placeholder="Doe" minlength="3" required autocomplete="off" />
          <div class="invalid-feedback">At least 3 characters</div>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="john@example.com" required autocomplete="off" />
          <div class="invalid-feedback">Valid email required</div>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required autocomplete="off" />
          <div class="invalid-feedback">Format: 123-456-7890</div>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label class="form-label">Subject</label>
          <select class="form-control" required>
            <option value="">Choose a subject</option>
            <option>Support</option>
            <option>Sales</option>
            <option>Feedback</option>
          </select>
          <div class="invalid-feedback">Please select a subject</div>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label class="form-label">Your Message</label>
          <textarea class="form-control" rows="4" placeholder="Write your message here…" minlength="10" required autocomplete="off"></textarea>
          <div class="invalid-feedback">Minimum 10 characters</div>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn">Send Message</button>
      </div>

    </form>

    <div class="card-footer">
      <span class="card-footer-note">Encrypted & secure</span>
      <span class="required-note">All fields <span>*</span> required</span>
    </div>

  </div>
</div>
