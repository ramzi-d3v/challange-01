 <link rel="stylesheet" href="./style.css">
<div class="theme-wrapper">

  <!-- Header row -->
  <div class="page-header">
    <div class="page-title-block">
      <span class="eyebrow">Container Style Queries</span>
      <h1 class="page-title">Theme<br /><span>Switch</span></h1>
    </div>

    <form class="theme-toggle">
      <label>
        <input type="radio" name="theme" value="light" checked />
        <span class="tab"><span class="tab-dot"></span>Light</span>
      </label>
      <label>
        <input type="radio" name="theme" value="dark" />
        <span class="tab"><span class="tab-dot"></span>Dark</span>
      </label>
      <label>
        <input type="radio" name="theme" value="retro" />
        <span class="tab"><span class="tab-dot"></span>Retro</span>
      </label>
      <label>
        <input type="radio" name="theme" value="neon" />
        <span class="tab"><span class="tab-dot"></span>Neon</span>
      </label>
    </form>
  </div>

  <!-- Cards -->
  <main class="card-row">

    <section class="product-card-wrapper">
      <div class="product-card">
        <div class="image" style="--image: url(https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=600&h=400&q=80)"></div>
        <div class="info">
          <h2 class="title">Vintage Sneakers</h2>
          <p class="desc">Classic look with modern comfort technology for all-day wear.</p>
          <div class="price-row">
            <span class="price">$89</span>
            <button class="buy-btn">Buy Now</button>
          </div>
        </div>
      </div>
    </section>

    <section class="product-card-wrapper">
      <div class="product-card">
        <div class="image" style="--image: url(https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=600&h=400&q=80)"></div>
        <div class="info">
          <h2 class="title">Shadow Backpack</h2>
          <p class="desc">Built for travelers with a sleek, water-resistant finish.</p>
          <div class="price-row">
            <span class="price">$129</span>
            <button class="buy-btn">Buy Now</button>
          </div>
        </div>
      </div>
    </section>

    <section class="product-card-wrapper">
      <div class="product-card">
        <div class="image" style="--image: url(https://images.unsplash.com/photo-1580261450046-d0a30080dc9b?auto=format&fit=crop&w=600&h=400&q=80)"></div>
        <div class="info">
          <h2 class="title">Retro Radio</h2>
          <p class="desc">Old-school vibe with modern Bluetooth technology built in.</p>
          <div class="price-row">
            <span class="price">$59</span>
            <button class="buy-btn">Buy Now</button>
          </div>
        </div>
      </div>
    </section>

  </main>
</div>
<script  src="./script.js"></script>
